kind: HTTPRoute
metadata:
  name: jellyfin-route
  namespace: media-center
  labels:
    app.kubernetes.io/component: http-route
    app.kubernetes.io/instance: test-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/version: 10.10.7
    helm.sh/chart: jellyfin-0.0.1
spec:
  parentRefs:
    - name: shared-platform-gateway
      namespace: istio-system
      kind: Gateway
      group: gateway.networking.k8s.io
      sectionName: https
  hostnames:
    - jellyfin-k8s.orhayoun.com
  rules:
    - backendRefs:
      - group: ""
        kind: Service
        name: jellyfin-http
        port: 8096
        weight: 100
      matches:
      - path:
          type: PathPrefix
          value: /
