apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media-center
  labels:
    app.kubernetes.io/component: deployment
    app.kubernetes.io/instance: test-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/version: 10.10.7
    helm.sh/chart: jellyfin-0.0.6
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
      app.kubernetes.io/instance: test-release
  template:
    metadata:
      labels:
        app.kubernetes.io/component: deployment
        app.kubernetes.io/instance: test-release
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: jellyfin
        app.kubernetes.io/version: 10.10.7
        helm.sh/chart: jellyfin-0.0.6
        app.kubernetes.io/part-of: media-center
        logging.kubernetes.io/component: media-center
        logging.kubernetes.io/service: jellyfin
    spec:
      
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        supplementalGroups:
        - 1010
      serviceAccountName: jellyfin
      nodeSelector:
        kubernetes.io/os: linux
      dnsPolicy: ClusterFirst
      automountServiceAccountToken: false
      enableServiceLinks: false
      containers:
        - name: jellyfin
          image: ghcr.io/runlix/jellyfin:10.11.6-stable@sha256:d4882496d6d004f3100b321606bcd94db393fb097f323aa97a0fa8506dd10750
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8096
              protocol: TCP
          env:
            - name: TZ
              value: UTC
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /config/data/backups
              name: backup
            - mountPath: /cache
              name: cache
            - mountPath: /tmp
              name: tmp
          resources:
            limits:
              cpu: 2000m
              ephemeral-storage: 4Gi
              memory: 4Gi
            requests:
              cpu: 250m
              ephemeral-storage: 1Gi
              memory: 1Gi
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 60
            periodSeconds: 30
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 20
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 5
          startupProbe:
            failureThreshold: 30
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            appArmorProfile:
              type: RuntimeDefault
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 20031
            runAsNonRoot: true
            runAsUser: 2001
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: backup
          nfs:
            path: /mnt/vol1/media-center/jellyfin
            server: snorlax.orhayoun.com
        - emptyDir:
            sizeLimit: 4Gi
          name: cache
        - emptyDir:
            sizeLimit: 1Gi
          name: tmp
