---
# Source: jellyfin/templates/all.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media-center
  labels:
    app.kubernetes.io/component: deployment
    app.kubernetes.io/instance: test-release
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/version: 10.10.7
    helm.sh/chart: jellyfin-0.0.4
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
      app.kubernetes.io/instance: test-release
  template:
    metadata:
      labels:
        app.kubernetes.io/component: deployment
        app.kubernetes.io/instance: test-release
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: jellyfin
        app.kubernetes.io/version: 10.10.7
        helm.sh/chart: jellyfin-0.0.4
        app.kubernetes.io/part-of: media-center
        logging.kubernetes.io/component: media-center
        logging.kubernetes.io/service: jellyfin
    spec:
      
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 20031
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        supplementalGroups:
        - 1010
        - 1003
      serviceAccountName: jellyfin
      nodeSelector:
        kubernetes.io/os: linux
      dnsPolicy: ClusterFirst
      automountServiceAccountToken: false
      enableServiceLinks: false
      containers:
        - name: jellyfin
          image: ghcr.io/runlix/jellyfin:10.11.6-stable@sha256:d4882496d6d004f3100b321606bcd94db393fb097f323aa97a0fa8506dd10750
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8096
              protocol: TCP
          env:
            - name: TZ
              value: UTC
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /cache
              name: cache
            - mountPath: /tmp
              name: tmp
          resources:
            limits:
              cpu: 2000m
              ephemeral-storage: 4Gi
              memory: 4Gi
            requests:
              cpu: 250m
              ephemeral-storage: 1Gi
              memory: 1Gi
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 60
            periodSeconds: 30
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 20
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 5
          startupProbe:
            failureThreshold: 30
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: http
            timeoutSeconds: 5
          lifecycle:
            postStart:
              exec:
                command:
                - /bin/sh
                - -c
                - |
                  echo "Waiting for /config/config/system.xml to enable Jellyfin metrics..."
                  timeout=300
                  interval=5
                  elapsed=0
            
                  while [ ! -f /config/config/system.xml ]; do
                    if [ "$elapsed" -ge "$timeout" ]; then
                      echo "WARN: Timed out waiting for /config/config/system.xml; leaving EnableMetrics unchanged."
                      exit 0
                    fi
                    sleep "$interval"
                    elapsed=$((elapsed + interval))
                  done
            
                  if grep -q '<EnableMetrics>true</EnableMetrics>' /config/config/system.xml; then
                    echo "Jellyfin metrics already enabled in system.xml."
                    exit 0
                  fi
            
                  if grep -q '<EnableMetrics>false</EnableMetrics>' /config/config/system.xml; then
                    sed -i 's,<EnableMetrics>false</EnableMetrics>,<EnableMetrics>true</EnableMetrics>,' /config/config/system.xml || true
                    echo "EnableMetrics updated to true in system.xml."
                    exit 0
                  fi
            
                  echo "WARN: EnableMetrics key not found in /config/config/system.xml; leaving config unchanged."
                  exit 0
          securityContext:
            allowPrivilegeEscalation: false
            appArmorProfile:
              type: RuntimeDefault
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 20031
            runAsNonRoot: true
            runAsUser: 20031
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - emptyDir:
            sizeLimit: 4Gi
          name: cache
        - emptyDir:
            sizeLimit: 1Gi
          name: tmp
