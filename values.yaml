# Default values for jellyfin
# Uses lib-chart workload model (0.0.13)

# ----------------------------------------------------------------------------
# Global Configuration
# ----------------------------------------------------------------------------
global:
  name: jellyfin
  namespace: media-center
  chart:
    appVersion: 10.10.7
  labels: {}

# ----------------------------------------------------------------------------
# Workload Configuration
# ----------------------------------------------------------------------------
workload:
  type: deployment
  spec:
    replicas: 1
    strategy:
      type: Recreate
    revisionHistoryLimit: 3
    terminationGracePeriodSeconds: 60
    dnsPolicy: ClusterFirst
    enableServiceLinks: false
    automountServiceAccountToken: false
    nodeSelector:
      kubernetes.io/os: linux

    podLabels:
      app.kubernetes.io/part-of: media-center
      logging.kubernetes.io/component: media-center
      logging.kubernetes.io/service: jellyfin

    podSecurityContext:
      fsGroup: 20031
      fsGroupChangePolicy: OnRootMismatch
      runAsNonRoot: true
      supplementalGroups:
        - 1010 # eevee-download-clients group

    containers:
      jellyfin:
        enabled: true
        image:
          repository: ghcr.io/runlix/jellyfin
          tag: "10.11.6-stable@sha256:d4882496d6d004f3100b321606bcd94db393fb097f323aa97a0fa8506dd10750"
          pullPolicy: Always

        env:
          - name: TZ
            value: "UTC"

        ports:
          - containerPort: 8096
            name: http
            protocol: TCP

        volumeMounts:
          - name: config
            mountPath: /config
          - name: backup
            mountPath: /config/data/backups
          - name: cache
            mountPath: /cache
          - name: tmp
            mountPath: /tmp

        livenessProbe:
          tcpSocket:
            port: http
          failureThreshold: 3
          initialDelaySeconds: 60
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 5

        readinessProbe:
          tcpSocket:
            port: http
          failureThreshold: 3
          initialDelaySeconds: 20
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5

        startupProbe:
          tcpSocket:
            port: http
          failureThreshold: 30
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5

        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 20031
          runAsGroup: 20031
          allowPrivilegeEscalation: false
          privileged: false
          appArmorProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault

        resources:
          requests:
            cpu: 250m
            memory: 1Gi
            ephemeral-storage: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
            ephemeral-storage: 4Gi

# ----------------------------------------------------------------------------
# Service Configuration
# ----------------------------------------------------------------------------
network:
  enabled: true
  services:
    enabled: true
    items:
      http:
        enabled: true
        type: ClusterIP
        ports:
          http:
            port: 8096
            targetPort: http
            protocol: TCP
        annotations:
          description: "Jellyfin HTTP service"

  httpRoute:
    enabled: true
    port: 8096
    host: jellyfin-k8s.orhayoun.com
    gateway:
      name: shared-platform-gateway
      namespace: istio-system
    routes:
      - name: route
        enabled: true
        listener:
          sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: jellyfin-http
                port: 8096
                weight: 100
                group: ""
                kind: Service
      - name: http-redirect
        enabled: true
        listener:
          sectionName: http
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            filters:
              - type: RequestRedirect
                requestRedirect:
                  scheme: https
                  statusCode: 301

  networkPolicy:
    enabled: true
    items:
      default:
        enabled: true
        policyTypes:
          - Ingress
          - Egress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: istio-system
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: shared-platform-gateway
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: monitoring
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: prometheus
            ports:
              - protocol: TCP
                port: 15008
        egress:
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
                podSelector:
                  matchLabels:
                    k8s-app: kube-dns
            ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53

          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: istio-system
            ports:
              - protocol: TCP
                port: 15008

          - to:
              - ipBlock:
                  cidr: "0.0.0.0/0"
                  except:
                    - "10.42.0.0/16"
                    - "10.43.0.0/16"
                    - "192.168.0.0/16"
            ports:
              - protocol: TCP
                port: 80
              - protocol: TCP
                port: 443

  istio:
    enabled: true
    authorizationPolicy:
      enabled: true
      items:
        ingress:
          enabled: true
          action: ALLOW
          rules:
            - from:
                - source:
                    principals:
                      - "cluster.local/ns/istio-system/sa/shared-platform-gateway-istio"
              to:
                - operation:
                    ports: ["8096"]
        prometheus:
          enabled: true
          action: ALLOW
          rules:
            - from:
                - source:
                    principals:
                      - "cluster.local/ns/monitoring/sa/prometheus-kube-prometheus-prometheus"
              to:
                - operation:
                    ports: ["8096"]
                    paths: ["/metrics"]
                    methods: ["GET"]
        deny-metrics-gateway:
          # Disabled by default for ambient mesh compatibility.
          # In ambient mode, ztunnel cannot enforce HTTP path matching on DENY policies.
          # Enable only when Jellyfin traffic is enforced by an L7-capable plane (for example, waypoint).
          enabled: false
          action: DENY
          rules:
            - from:
                - source:
                    principals:
                      - "cluster.local/ns/istio-system/sa/shared-platform-gateway-istio"
              to:
                - operation:
                    ports: ["8096"]
                    paths: ["/metrics"]
    destinationRule:
      enabled: true
      host: jellyfin-http
      trafficPolicy:
        connectionPool:
          tcp:
            maxConnections: 100
          http:
            http1MaxPendingRequests: 10
            http2MaxRequests: 100
            maxRequestsPerConnection: 2
        outlierDetection:
          consecutive5xxErrors: 5
          interval: 30s
          baseEjectionTime: 30s
          maxEjectionPercent: 50

# ----------------------------------------------------------------------------
# Feature: Persistence
# ----------------------------------------------------------------------------
persistence:
  enabled: true
  # Media library mount override examples (NFS/PVC/SMB) are documented in README.md.
  claims:
    config:
      size: 10Gi
      storageClass: longhorn
      accessMode: ReadWriteOnce
      retain: true
  volumes:
    - name: config
      persistentVolumeClaim:
        claimName: jellyfin-config
    - name: backup
      nfs:
        server: snorlax.orhayoun.com
        path: /mnt/vol1/k8s/media-center/jellyfin
    - name: cache
      emptyDir:
        sizeLimit: 4Gi
    - name: tmp
      emptyDir:
        sizeLimit: 1Gi

# ----------------------------------------------------------------------------
# Feature: Observability
# ----------------------------------------------------------------------------
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    port: 8096
    portName: http
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    honorLabels: false
    selector:
      matchLabels:
        app.kubernetes.io/name: jellyfin
        app.kubernetes.io/instance: jellyfin
        app.kubernetes.io/component: service-http
    namespaceSelector:
      matchNames:
        - media-center
    relabelings:
      - action: replace
        sourceLabels:
          - __meta_kubernetes_namespace
        targetLabel: namespace
      - action: replace
        sourceLabels:
          - __meta_kubernetes_pod_name
        targetLabel: instance
    metricRelabelings:
      - action: replace
        replacement: jellyfin
        targetLabel: service
      - action: replace
        replacement: media-center
        targetLabel: component

  prometheusRule:
    enabled: true
    rules:
      - alert: JellyfinMetricsTargetDown
        expr: up{service="jellyfin", component="media-center", namespace="media-center"} < 1
        for: 5m
        labels:
          severity: critical
          service: jellyfin
          component: media-center
          source: native-metrics
        annotations:
          summary: "Jellyfin metrics target is down"
          description: "Prometheus failed to scrape Jellyfin metrics for more than 5 minutes."
      - alert: JellyfinMetricsScrapeSlow
        expr: max_over_time(scrape_duration_seconds{service="jellyfin", component="media-center", namespace="media-center"}[10m]) > 2
        for: 10m
        labels:
          severity: warning
          service: jellyfin
          component: media-center
          source: native-metrics
        annotations:
          summary: "Jellyfin metrics scrape is slow"
          description: "Jellyfin scrape duration exceeded 2 seconds for more than 10 minutes (max={{ $value }}s)."
      - alert: JellyfinNativeHttp5xxRateHigh
        expr: |
          (
            (
              sum(rate(http_requests_received_total{service="jellyfin", component="media-center", namespace="media-center", code=~"5.."}[5m]))
              /
              sum(rate(http_requests_received_total{service="jellyfin", component="media-center", namespace="media-center"}[5m]))
            ) * 100 > 2
          )
          and
          sum(rate(http_requests_received_total{service="jellyfin", component="media-center", namespace="media-center"}[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          service: jellyfin
          component: media-center
          source: native-metrics
        annotations:
          summary: "Jellyfin native HTTP 5xx rate is high"
          description: "Jellyfin native HTTP 5xx response rate exceeded 2% for more than 10 minutes."
      - alert: JellyfinNativeHttpP95LatencyHigh
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service="jellyfin", component="media-center", namespace="media-center"}[5m])) by (le)) > 1.5
        for: 10m
        labels:
          severity: warning
          service: jellyfin
          component: media-center
          source: native-metrics
        annotations:
          summary: "Jellyfin native HTTP p95 latency is high"
          description: "Jellyfin native HTTP p95 latency is above 1.5 seconds for more than 10 minutes (value={{ $value }}s)."
      - alert: JellyfinDeploymentUnavailable
        expr: kube_deployment_status_replicas_available{deployment="jellyfin", namespace="media-center"} < 1
        for: 5m
        labels:
          severity: critical
          service: jellyfin
          component: media-center
        annotations:
          summary: "Jellyfin deployment is unavailable"
          description: "No Jellyfin replicas are available for more than 5 minutes."
      - alert: JellyfinContainerRestartsHigh
        expr: increase(kube_pod_container_status_restarts_total{namespace="media-center", pod=~"jellyfin-.*", container="jellyfin"}[1h]) > 2
        for: 0m
        labels:
          severity: warning
          service: jellyfin
          component: media-center
        annotations:
          summary: "Jellyfin container restarting frequently"
          description: "Jellyfin container in pod {{ $labels.pod }} restarted more than 2 times in the last hour."
      - alert: JellyfinHighCPUUtilization
        expr: |
          (
            sum(rate(container_cpu_usage_seconds_total{namespace="media-center", pod=~"jellyfin-.*", container="jellyfin"}[5m]))
            /
            sum(kube_pod_container_resource_requests{namespace="media-center", pod=~"jellyfin-.*", container="jellyfin", resource="cpu"})
          ) * 100 > 80
        for: 10m
        labels:
          severity: warning
          service: jellyfin
          component: media-center
          resource: cpu
        annotations:
          summary: "Jellyfin CPU utilization is high"
          description: "Jellyfin CPU usage is above 80% of requested CPU for more than 10 minutes (value={{ $value }}%)."
      - alert: JellyfinHighMemoryUtilization
        expr: |
          (
            max(container_memory_working_set_bytes{namespace="media-center", pod=~"jellyfin-.*", container="jellyfin"})
            /
            max(kube_pod_container_resource_limits{namespace="media-center", pod=~"jellyfin-.*", container="jellyfin", resource="memory"})
          ) * 100 > 85
        for: 10m
        labels:
          severity: warning
          service: jellyfin
          component: media-center
          resource: memory
        annotations:
          summary: "Jellyfin memory utilization is high"
          description: "Jellyfin memory working set is above 85% of memory limit for more than 10 minutes (value={{ $value }}%)."
      - alert: JellyfinConfigPVCHighUsage
        expr: |
          (
            kubelet_volume_stats_used_bytes{persistentvolumeclaim="jellyfin-config", namespace="media-center"}
            /
            kubelet_volume_stats_capacity_bytes{persistentvolumeclaim="jellyfin-config", namespace="media-center"}
          ) * 100 > 85
        for: 15m
        labels:
          severity: warning
          service: jellyfin
          component: media-center
          resource: storage
        annotations:
          summary: "Jellyfin config PVC usage is high"
          description: "Jellyfin config PVC usage has exceeded 85% for more than 15 minutes (value={{ $value }}%)."
      - alert: JellyfinConfigPVCInodesHighUsage
        expr: |
          (
            kubelet_volume_stats_inodes_used{persistentvolumeclaim="jellyfin-config", namespace="media-center"}
            /
            kubelet_volume_stats_inodes{persistentvolumeclaim="jellyfin-config", namespace="media-center"}
          ) * 100 > 85
        for: 15m
        labels:
          severity: warning
          service: jellyfin
          component: media-center
          resource: storage
        annotations:
          summary: "Jellyfin config PVC inode usage is high"
          description: "Jellyfin config PVC inode usage has exceeded 85% for more than 15 minutes (value={{ $value }}%)."
      - alert: JellyfinIstioHigh5xxRate
        expr: |
          (
            (
              sum(rate(istio_requests_total{destination_service_name="jellyfin-http", destination_service_namespace="media-center", response_code=~"5.."}[5m]))
              /
              sum(rate(istio_requests_total{destination_service_name="jellyfin-http", destination_service_namespace="media-center"}[5m]))
            ) * 100 > 2
          )
          and
          sum(rate(istio_requests_total{destination_service_name="jellyfin-http", destination_service_namespace="media-center"}[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          service: jellyfin
          component: media-center
          traffic: istio
        annotations:
          summary: "Jellyfin Istio 5xx error rate is high"
          description: "Jellyfin 5xx response rate exceeded 2% for more than 10 minutes."
      - alert: JellyfinIstioHighP95Latency
        expr: histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{destination_service_name="jellyfin-http", destination_service_namespace="media-center"}[5m])) by (le)) > 750
        for: 10m
        labels:
          severity: warning
          service: jellyfin
          component: media-center
          traffic: istio
        annotations:
          summary: "Jellyfin Istio p95 latency is high"
          description: "Jellyfin p95 request latency is above 750ms for more than 10 minutes (value={{ $value }}ms)."
      - alert: JellyfinAuthorizationPolicyDenials
        expr: |
          sum(
            rate(istio_requests_total{
              destination_workload="jellyfin",
              destination_workload_namespace="media-center",
              destination_service_name="jellyfin-http",
              request_protocol="http",
              response_code="403",
              response_flags="SEC"
            }[5m])
          ) > 0
        for: 2m
        labels:
          severity: warning
          service: jellyfin
          component: media-center
          security: authorization
        annotations:
          summary: "Jellyfin authorization policy denials detected"
          description: "Jellyfin is experiencing authorization policy denials (403/SEC)."
      - alert: JellyfinHighAuthorizationDenialRate
        expr: |
          (
            sum(
              rate(istio_requests_total{
                destination_workload="jellyfin",
                destination_workload_namespace="media-center",
                destination_service_name="jellyfin-http",
                request_protocol="http",
                response_code="403",
                response_flags="SEC"
              }[5m])
            )
            /
            sum(
              rate(istio_requests_total{
                destination_workload="jellyfin",
                destination_workload_namespace="media-center",
                destination_service_name="jellyfin-http",
                request_protocol="http"
              }[5m])
            )
          ) * 100 > 5
        for: 5m
        labels:
          severity: critical
          service: jellyfin
          component: media-center
          security: authorization
        annotations:
          summary: "Jellyfin high authorization denial rate"
          description: "Jellyfin has a high authorization denial rate ({{ $value }}% of requests denied)."

  grafana:
    enabled: true
    instanceSelector:
      matchLabels:
        app.kubernetes.io/instance: prometheus
        app.kubernetes.io/name: grafana
    dashboard:
      enabled: true
      items:
        jellyfin-dashboard:
          enabled: true
          name: "application"
          allowCrossNamespaceImport: true
          file: "app.json"

# ----------------------------------------------------------------------------
# Service Account
# ----------------------------------------------------------------------------
serviceAccount:
  create: true
  name: "jellyfin"
  automount: false
  annotations:
    description: "Jellyfin media center service account"

# ----------------------------------------------------------------------------
# Pod Disruption Budget
# ----------------------------------------------------------------------------
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  unhealthyPodEvictionPolicy: AlwaysAllow

# Backup strategy:
# - Jellyfin creates and restores archives from <DataPath>/backups.
# - In this chart, DataPath is under /config, so the native backup path is /config/data/backups.
# - The default NFS "backup" volume is mounted directly at /config/data/backups.
# - Scope intentionally excludes source media content; this mount is for Jellyfin app-state archives.
